type: charm

parts:
  charm:
    charm-entrypoint: "hooks/install"
    build-packages:
      - tox
      - git
      - python3-dev
      - libffi-dev
    override-build: |
      apt-get install ca-certificates -y
      tox -e build-reactive
    override-stage: |
      echo "Copying charm to staging area: $CRAFT_STAGE"
      NAME=$(ls $CRAFT_PART_BUILD/build/builds)
      cp -r $CRAFT_PART_BUILD/build/builds/$NAME/* $CRAFT_STAGE/
    override-prime: |
      # For some reason, the normal priming chokes on the fact that there's a
      # hooks directory.
      cp -r $CRAFT_STAGE/* .

base: ubuntu@24.04
platforms:
  amd64:
    build-on: amd64
    build-for: amd64
  arm64:
    build-on: arm64
    build-for: arm64
  ppc64el:
    build-on: ppc64el
    build-for: ppc64el
  s390x:
    build-on: s390x
    build-for: s390x
