charm_name: ceph-mon

gate_bundles:
  - noble-caracal

smoke_bundles:
  - noble-caracal

configure:
  - tests.target.setup_osds

tests:
  - tests.target.CheckPoolTypes
  - tests.target.CephLowLevelTest
  - tests.target.CephTest
  - tests.target.CephPrometheusTest
  # Charm upgrade, then re-run tests
  - zaza.charm_tests.lifecycle.tests.UpgradeCharmsToPath;ceph-mon
  - tests.target.CephMonJujuPersistent
  - tests.target.CheckPoolTypes
  - tests.target.CephLowLevelTest
  - tests.target.CephTest
  - tests.target.CephPrometheusTest
  # Tests from quincy.
  - tests.target.CephAuthTest
  - tests.target.CephMonActionsTest
  - tests.target.CephMonKeyRotationTests

target_deploy_status:
  ceph-osd:
    workload-status: blocked
    workload-status-message: 'No block devices detected using current configuration'

  ceph-mon:
    workload-status: waiting
    workload-status-message-prefix: 'Monitor bootstrapped but waiting for number of OSDs to reach expected-osd-count'
