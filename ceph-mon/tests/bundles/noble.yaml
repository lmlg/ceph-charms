variables:
  openstack-origin: &openstack-origin distro

local_overlay_enabled: False

series: noble

comment:
- 'machines section to decide order of deployment. database sooner = faster'
machines:
  '0':
  '1':
  '2':
  '3':
    constraints: virt-type=virtual-machine mem=4G
  '4':
    constraints: virt-type=virtual-machine mem=4G
  '5':
    constraints: virt-type=virtual-machine mem=4G
  '6':
    series: jammy

applications:

  ceph-osd:
    charm: ch:ceph-osd
    num_units: 3
    options:
      source: *openstack-origin
      osd-devices: '/dev/test-non-existent'
    to:
      - '3'
      - '4'
      - '5'
    channel: latest/edge

  ceph-mon:
    charm: ch:ceph-mon
    channel: latest/edge
    num_units: 3
    options:
      source: *openstack-origin
      monitor-count: '3'
    to:
      - '0'
      - '1'
      - '2'

  prometheus2:
    charm: ch:prometheus2
    series: jammy
    channel: latest/stable
    num_units: 1
    to:
      - '6'

relations:
  - - 'ceph-osd:mon'
    - 'ceph-mon:osd'

  - - 'ceph-mon:prometheus'
    - 'prometheus2:target'
